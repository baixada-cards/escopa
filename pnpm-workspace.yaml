packages:
  - '.'

# Equivalent to npm min-release-age=7 (days); value is minutes.
minimumReleaseAge: 10080

# Temporary security exceptions for the Next.js and fast-uri fixes. Their exact
# versions remain lockfile-pinned; remove these names after the seven-day gate.
minimumReleaseAgeExclude:
  - next
  - "@next/*"
  - fast-uri

# Exact-commit Git dependency whose prepare hook compiles reviewed TS sources.
onlyBuiltDependencies:
  - "@baixada-cards/design-system"
